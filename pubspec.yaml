name: feeltrip_app
description: Agencia de viajes emocionales. Descubre destinos con IA y quiz de personalidad.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.0
  http: ^1.6.0
  shared_preferences: ^2.0.15
  camera: ^0.10.5
  video_player: ^2.4.7
  path_provider: ^2.0.11
  provider: ^6.0.5
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.1.0
  connectivity_plus: ^5.0.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^0.8.7
  firebase_auth: ^5.1.0
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: 12.4.10
  cloud_functions: ^5.0.0
  uuid: ^4.0.0
  cached_network_image: ^3.2.3
  table_calendar: ^3.0.8
  flutter_dotenv: ^6.0.0
  share_plus: ^7.2.0
  url_launcher: ^6.3.2
  firebase_messaging: ^15.0.0
  purchases_flutter: ^9.10.0
  in_app_purchase: ^3.1.13
  google_mobile_ads: ^7.0.0
  flutter_stripe: ^10.1.1
  fl_chart: ^0.66.0
  firebase_analytics: ^11.6.0
  firebase_performance: ^0.10.1+5
  in_app_review: ^2.0.9
  go_router: ^14.6.2
  firebase_crashlytics: ^4.3.2
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.2
  google_maps_flutter: ^2.5.3
  geocoding: ^3.0.0
  lottie: ^3.1.0
  get: ^4.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.4

dependency_overrides:
  js: ^0.7.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo.png
    - assets/images/Onboarding1.png
    - assets/images/Onboarding2.png
    - assets/images/Onboarding3.png
    - assets/images/tromso_aurora.png
    - assets/images/tuscana_nonna.png
    - assets/images/queenstown_adventure.png
    - assets/images/bali_yoga.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
