name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Flutter Pub Get
        run: flutter pub get
      - name: Validate Firebase env template
        run: |
          required_keys=(
            FIREBASE_ANDROID_API_KEY
            FIREBASE_ANDROID_APP_ID
            FIREBASE_ANDROID_MESSAGING_SENDER_ID
            FIREBASE_ANDROID_PROJECT_ID
            FIREBASE_IOS_API_KEY
            FIREBASE_IOS_APP_ID
            FIREBASE_IOS_MESSAGING_SENDER_ID
            FIREBASE_IOS_PROJECT_ID
            FIREBASE_WINDOWS_API_KEY
            FIREBASE_WINDOWS_APP_ID
            FIREBASE_WINDOWS_MESSAGING_SENDER_ID
            FIREBASE_WINDOWS_PROJECT_ID
            FIREBASE_WEB_API_KEY
            FIREBASE_WEB_APP_ID
            FIREBASE_WEB_MESSAGING_SENDER_ID
            FIREBASE_WEB_PROJECT_ID
          )
          for key in "${required_keys[@]}"; do
            grep -q "^${key}=" .env.example || (echo "Missing ${key} in .env.example" && exit 1)
          done
      - name: Flutter Analyze
        run: flutter analyze
      - name: Flutter Test
        run: >
          flutter test
          test/services
          test/unit/admob_service_test.dart
          test/unit/auth_controller_test.dart
          test/unit/auth_service_test.dart
          test/unit/database_service_test.dart
          test/unit/diary_controller_test.dart
          test/unit/experience_controller_test.dart
          test/widget_test.dart
          --dart-define=APP_ENV=staging
      - name: Build APK Staging (debug)
        run: flutter build apk --debug --dart-define=APP_ENV=staging
      - name: Build APK Prod (debug)
        run: flutter build apk --debug --dart-define=APP_ENV=prod

  functions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Functions
        run: npm run build
