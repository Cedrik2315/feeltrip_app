name: feeltrip_app
description: App de viajes vivenciales
version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.4
  shared_preferences: ^2.0.15
  camera: ^0.10.5
  video_player: ^2.4.7
  path_provider: ^2.0.11
  provider: ^6.0.5
  get: ^4.6.5
  intl: ^0.18.0
  carousel_slider: 5.1.1
  smooth_page_indicator: ^1.1.0
  connectivity_plus: ^5.0.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^0.8.7
  firebase_auth: ^4.6.0
  firebase_core: ^2.13.0
  cloud_firestore: ^4.8.0
  uuid: ^3.0.7
  cached_network_image: ^3.2.3
  table_calendar: ^3.0.8
  flutter_dotenv: ^6.0.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
