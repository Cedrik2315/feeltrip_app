name: feeltrip_app
description: Agencia de viajes emocionales. Descubre destinos con IA y quiz de personalidad.
version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Cambiado de 'any' a la versión específica para evitar el error con el SDK
  intl: ^0.20.2

  google_generative_ai: ^0.4.0
  http: ^1.2.1
  shared_preferences: ^2.0.15
  camera: ^0.10.5
  video_player: ^2.11.0
  path_provider: ^2.0.11
  provider: ^6.0.5
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.1.0
  connectivity_plus: ^5.0.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^0.8.7
  firebase_auth: ^5.1.1
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0
  cloud_functions: ^5.0.1
  uuid: ^4.0.0
  cached_network_image: ^3.2.3
  table_calendar: ^3.0.8
  flutter_dotenv: ^5.1.0
  share_plus: ^7.2.0
  url_launcher: ^6.3.2
  firebase_messaging: ^15.0.1
  purchases_flutter: ^9.10.0
  in_app_purchase: ^3.1.13
  google_mobile_ads: ^7.0.0
  fl_chart: ^0.66.0
  firebase_analytics: ^11.6.0
  firebase_performance: ^0.10.1+5
  in_app_review: ^2.0.9
  go_router: ^14.6.2
  firebase_crashlytics: ^4.3.2
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.2
  google_maps_flutter: ^2.5.3
  geocoding: ^3.0.0
  lottie: ^3.1.0
  get: ^4.6.6
  confetti: ^0.8.0
  translator: ^1.0.0
  app_links: ^6.0.0
  simple_animations: ^5.0.2
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.4

dependency_overrides:
  js: ^0.7.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo.png
    - assets/images/Onboarding1.png
    - assets/images/Onboarding2.png
    - assets/images/Onboarding3.png
    - assets/images/tromso_aurora.png
    - assets/images/tuscana_nonna.png
    - assets/images/queenstown_adventure.png
    - assets/images/bali_yoga.png
    - assets/video/video_FeelTrip.mp4
    - assets/maps/retro_style.json
    - assets/maps/cyberpunk_style.json
    - assets/maps/zen_style.json
    - assets/maps/vibrant_style.json
    - assets/maps/mystery_style.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
